<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devon Ashworth — Fullstack Engineer</title>
<style>
  :root{
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --surface-2: #EFEFEC;
    --ink: #14161A;
    --muted: #62666F;
    --line: #E2E2DE;
    --accent: #3452FF;
    --accent-ink: #FFFFFF;
    --live: #00A389;
    --shadow: 0 1px 2px rgba(20,22,26,.04), 0 8px 24px rgba(20,22,26,.05);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg: #0F1115;
      --surface: #16181D;
      --surface-2: #1D2027;
      --ink: #ECEDEF;
      --muted: #8A8F98;
      --line: #272A32;
      --accent: #7C90FF;
      --accent-ink: #0F1115;
      --live: #2FD9B8;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
    }
  }

  *,*::before,*::after{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono{ font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, "Liberation Mono", monospace; }
  a{ color: inherit; }
  img{ max-width:100%; display:block; }
  ::selection{ background: var(--accent); color: var(--accent-ink); }
  :focus-visible{ outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 2px; }

  .wrap{ max-width: 1040px; margin: 0 auto; padding: 0 28px; }

  /* ---------- nav ---------- */
  header.site{
    position: sticky; top:0; z-index: 50; -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    border-bottom: 1px solid var(--line);
  }
  header.site .row{
    display:flex; align-items:center; justify-content:space-between; padding: 18px 0;
  }
  .brand{ font-weight: 650; letter-spacing: -0.01em; font-size: 15px; }
  .brand span{ color: var(--muted); font-weight: 400; }
  nav.links{ display:flex; align-items:center; gap: 28px; }
  nav.links a{ font-size: 14px; color: var(--muted); text-decoration:none; }
  nav.links a:hover{ color: var(--ink); }
  .cta-btn{
    display:inline-flex; align-items:center; gap:8px; background: var(--accent); color: var(--accent-ink);
    padding: 9px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration:none;
    box-shadow: var(--shadow);
  }
  @media (max-width: 720px){ nav.links a:not(.cta-btn){ display:none; } }

  /* ---------- hero ---------- */
  .hero{ padding: 76px 0 40px; }
  .status{
    display:inline-flex; align-items:center; gap:8px; font-size: 12.5px; color: var(--muted);
    padding: 6px 12px; border:1px solid var(--line); border-radius: 999px; margin-bottom: 26px;
  }
  .status .dot{
    width:7px; height:7px; border-radius:50%; background: var(--live);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--live) 20%, transparent);
  }
  h1.headline{
    font-size: clamp(34px, 5.2vw, 58px); line-height: 1.08; letter-spacing: -0.02em;
    font-weight: 650; max-width: 15ch; margin: 0 0 22px;
  }
  h1.headline .accent{ color: var(--accent); }
  .lede{ font-size: 18px; color: var(--muted); max-width: 56ch; line-height: 1.55; margin: 0 0 32px; }
