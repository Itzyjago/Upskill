<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devon Ashworth — Fullstack Engineer</title>
<style>
  :root{
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --surface-2: #EFEFEC;
    --ink: #14161A;
    --muted: #62666F;
    --line: #E2E2DE;
    --accent: #3452FF;
    --accent-ink: #FFFFFF;
    --live: #00A389;
    --shadow: 0 1px 2px rgba(20,22,26,.04), 0 8px 24px rgba(20,22,26,.05);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg: #0F1115;
      --surface: #16181D;
      --surface-2: #1D2027;
      --ink: #ECEDEF;
      --muted: #8A8F98;
      --line: #272A32;
      --accent: #7C90FF;
      --accent-ink: #0F1115;
      --live: #2FD9B8;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
    }
  }

  *,*::before,*::after{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono{ font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, "Liberation Mono", monospace; }
  a{ color: inherit; }
  img{ max-width:100%; display:block; }
  ::selection{ background: var(--accent); color: var(--accent-ink); }
  :focus-visible{ outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 2px; }

  .wrap{ max-width: 1040px; margin: 0 auto; padding: 0 28px; }

  /* ---------- nav ---------- */
  header.site{
    position: sticky; top:0; z-index: 50; -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    border-bottom: 1px solid var(--line);
  }
  header.site .row{
    display:flex; align-items:center; justify-content:space-between; padding: 18px 0;
  }
  .brand{ font-weight: 650; letter-spacing: -0.01em; font-size: 15px; }
  .brand span{ color: var(--muted); font-weight: 400; }
  nav.links{ display:flex; align-items:center; gap: 28px; }
  nav.links a{ font-size: 14px; color: var(--muted); text-decoration:none; }
  nav.links a:hover{ color: var(--ink); }
  .cta-btn{
    display:inline-flex; align-items:center; gap:8px; background: var(--accent); color: var(--accent-ink);
    padding: 9px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration:none;
    box-shadow: var(--shadow);
  }
  @media (max-width: 720px){ nav.links a:not(.cta-btn){ display:none; } }

  /* ---------- hero ---------- */
  .hero{ padding: 76px 0 40px; }
  .status{
    display:inline-flex; align-items:center; gap:8px; font-size: 12.5px; color: var(--muted);
    padding: 6px 12px; border:1px solid var(--line); border-radius: 999px; margin-bottom: 26px;
  }
  .status .dot{
    width:7px; height:7px; border-radius:50%; background: var(--live);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--live) 20%, transparent);
  }
  h1.headline{
    font-size: clamp(34px, 5.2vw, 58px); line-height: 1.08; letter-spacing: -0.02em;
    font-weight: 650; max-width: 15ch; margin: 0 0 22px;
  }
  h1.headline .accent{ color: var(--accent); }
  .lede{ font-size: 18px; color: var(--muted); max-width: 56ch; line-height: 1.55; margin: 0 0 32px; }
  .hero-actions{ display:flex; gap:14px; flex-wrap: wrap; }
  .btn-secondary{
    display:inline-flex; align-items:center; gap:8px; background: transparent; color: var(--ink);
    padding: 9px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration:none;
    border: 1px solid var(--line);
  }
  .btn-secondary:hover{ border-color: var(--muted); }

  /* ---------- stack diagram (signature element) ---------- */
  .stack{ margin: 64px 0 84px; }
  .stack-label{
    font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 14px;
  }
  .layer{
    display:grid; grid-template-columns: 130px 1fr; align-items: center; gap: 20px;
    padding: 16px 20px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface);
    margin-bottom: 10px; position: relative; overflow: hidden;
  }
  .layer::before{
    content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background: var(--line);
  }
  .layer.pulse::before{ animation: pulse 3.6s ease-in-out infinite; animation-delay: calc(var(--i) * .45s); }
  @keyframes pulse{
    0%, 100%{ background: var(--line); }
    30%{ background: var(--accent); }
  }
  .layer .tier{ font-size: 13px; font-weight: 650; color: var(--muted); }
  .layer .chips{ display:flex; flex-wrap: wrap; gap: 8px; }
  .chip{
    font-size: 12.5px; padding: 4px 10px; border-radius: 6px; background: var(--surface-2); color: var(--ink);
  }
  @media (max-width: 640px){
    .layer{ grid-template-columns: 1fr; gap: 6px; padding: 14px 16px 16px; }
  }
  @media (prefers-reduced-motion: reduce){
    .layer.pulse::before{ animation: none; background: var(--accent); opacity:.5; }
    html{ scroll-behavior: auto; }
  }

  /* ---------- section shell ---------- */
  section{ padding: 64px 0; border-top: 1px solid var(--line); }
  .eyebrow{ font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 14px; }
  h2{ font-size: clamp(22px, 3vw, 28px); letter-spacing: -0.01em; margin: 0 0 8px; }
  .section-lede{ color: var(--muted); max-width: 60ch; margin: 0 0 40px; line-height: 1.55; }

  /* ---------- proof / work ---------- */
  .proj-row{
    display:grid; grid-template-columns: 1fr auto; gap: 8px 24px; align-items: start;
    padding: 26px 0; border-bottom: 1px solid var(--line); text-decoration:none;
  }
  .proj-row:last-child{ border-bottom: none; }
  .proj-row .name{ font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .proj-row .desc{ color: var(--muted); font-size: 14.5px; max-width: 60ch; line-height:1.5; }
  .proj-row .metric{
    font-size: 13px; color: var(--live); font-weight: 650; text-align: right; white-space: nowrap;
  }
  .proj-row .tags{ grid-column: 1 / -1; margin-top: 12px; display:flex; gap:8px; flex-wrap: wrap; }
  .proj-row .tags span{ font-size: 12px; color: var(--muted); background: var(--surface-2); padding: 3px 9px; border-radius: 5px; }
  a.proj-row{ color: inherit; display:block; border-radius: 8px; }
  a.proj-row:hover .name{ color: var(--accent); }

  /* ---------- principles ---------- */
  .principles{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  @media (max-width: 760px){ .principles{ grid-template-columns: 1fr; } }
  .principle h3{ font-size: 15.5px; margin: 0 0 8px; }
  .principle p{ font-size: 14.5px; color: var(--muted); line-height:1.55; margin:0; }

  /* ---------- footer ---------- */
  footer{
    padding: 56px 0 72px; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap: wrap; gap: 24px;
  }
  footer h2{ margin-bottom: 14px; }
  .footer-links{ display:flex; gap: 20px; }
  .footer-links a{ font-size: 14px; color: var(--muted); text-decoration:none; }
  .footer-links a:hover{ color: var(--ink); }
  .footer-meta{ font-size: 12.5px; color: var(--muted); text-align:right; }
</style>
</head>
<body>

<header class="site">
  <div class="wrap row">
    <div class="brand">Devon Ashworth <span>/ fullstack engineer</span></div>
    <nav class="links">
      <a href="#work">Work</a>
      <a href="#approach">Approach</a>
      <a href="#contact">Contact</a>
      <a class="cta-btn" href="#contact">Get in touch</a>
    </nav>
  </div>
</header>

<main class="wrap">
