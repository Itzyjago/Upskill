# CI for the wordcount project — the roadmap "real pipeline" goal.
# lint → test → build, cheapest job first so failures surface fast.
name: CI

on:
  push:
    branches: [main]
    paths: ["projects/wordcount/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["projects/wordcount/**", ".github/workflows/ci.yml"]

defaults:
  run:
    working-directory: projects/wordcount

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: projects/wordcount/go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pinned, not "latest" — golangci-lint-action@v6 only documents
          # compatibility with golangci-lint v1.x (v2 needs action v7+, plus a
          # .golangci.yml schema migration this repo hasn't done). "latest" had
          # already drifted onto a v2 release, which v6 doesn't officially
          # support (notes/ci-cd.md).
          version: v1.64.8
          working-directory: projects/wordcount

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: projects/wordcount/go.mod
      - run: go test -race -cover ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: projects/wordcount/go.mod
      - run: go build -o bin/wc .
      - name: Smoke test the binary
        run: echo "hello world" | ./bin/wc
