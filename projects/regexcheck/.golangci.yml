# Same config as projects/wordcount/.golangci.yml -- kept identical rather
# than inventing a second opinion for a second small project.
version: "2"

run:
  timeout: 2m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - revive

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
