# Kubernetes manifest for wordcount's serve mode — roadmap #4 (deploy + probe)
# and #15 (the HPA at the bottom). Apply with: kubectl apply -f deploy/k8s.yaml
# The HPA needs metrics-server on the cluster first: `make kind-metrics-server`.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordcount
  labels:
    app: wordcount
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wordcount
  template:
    metadata:
      labels:
        app: wordcount
      annotations:
        # Prometheus' k8s service-discovery looks for these to know what to scrape.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: wordcount
          image: wordcount:latest
          # :latest defaults to Always, which fails on a kind-loaded image with
          # no registry to pull from — see notes/kind.md.
          imagePullPolicy: IfNotPresent
          args: ["-serve", ":8080"]
          ports:
            - containerPort: 8080
          # Liveness: cheap, local — only restart if the process is wedged.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          # Readiness: same endpoint here, but its job is to gate traffic, not
          # restart. Kept dependency-light on purpose.
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 1
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: wordcount
spec:
  type: NodePort
  selector:
    app: wordcount
  ports:
    - port: 80
      targetPort: 8080
      # Matches deploy/kind.yaml's extraPortMapping so `curl localhost:8080`
      # on the host reaches the Service during a local rollout.
      nodePort: 30080
---
# roadmap #15 — the Deployment above ran on kind (#4/#5); this is the
# "scales" half. Needs metrics-server installed on the cluster first
# (notes/kubernetes.md) — not there by default on kind.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wordcount
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wordcount
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # The Deployment's requests.cpu (10m) is the denominator for this
          # percentage — see notes/kubernetes.md "without requests.cpu set,
          # a CPU-based HPA has nothing to compute a percentage of."
          averageUtilization: 70
