# Alerting rules for wordcount — roadmap #8, now reading the recorded series
# from recording.yml (roadmap #11). Loaded by prometheus.yml's rule_files and
# pushed to Alertmanager when firing (roadmap #10, notes/alertmanager.md).
# These read the precomputed job:... series so the alert and the Grafana
# dashboard ask the exact same question — no drifting copies of the PromQL.
# See notes/recording-rules.md.
groups:
  - name: wordcount-golden-signals
    rules:
      # Errors — page when 5xx exceed 5% of traffic for 2 minutes.
      - alert: HighErrorRate
        expr: job:http_requests:error_ratio5m > 0.05
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "wordcount 5xx error ratio above 5%"
          description: "Error ratio is {{ $value | humanizePercentage }} over the last 5m."

      # Latency — warn when p95 crosses 500ms (well past this in-memory handler's norm).
      - alert: HighLatencyP95
        expr: job:http_request_duration_seconds:p95_5m > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "wordcount p95 latency above 500ms"
          description: "p95 latency is {{ $value }}s over the last 5m."

      # Traffic — a dead service serves nothing; warn if no requests for 10m.
      - alert: NoTraffic
        expr: job:http_requests:rate5m == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "wordcount served no requests in 10m"
          description: "No requests scraped — the service may be idle or down."
