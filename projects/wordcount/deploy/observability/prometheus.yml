# Prometheus config for the local wordcount stack — roadmap #8.
# Mounted into the prometheus container by deploy/observability/docker-compose.yml.
# Scrapes the app's hand-rolled /metrics endpoint (no client_golang) every 5s.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

# Alerting rules, evaluated every evaluation_interval (see notes/alerting.md).
rule_files:
  - /etc/prometheus/rules/*.yml

# Where firing alerts get pushed for routing/delivery — roadmap #10.
# Prometheus only decides an alert fires; Alertmanager owns everything after
# (grouping, routing to a receiver). See notes/alertmanager.md.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # The app. "wordcount" resolves to the compose service over the default network.
  - job_name: wordcount
    metrics_path: /metrics
    static_configs:
      - targets: ["wordcount:8080"]
        labels:
          app: wordcount

  # Prometheus scraping itself — handy for confirming the server is alive and for
  # seeing what its own `up`/scrape-duration series look like.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
