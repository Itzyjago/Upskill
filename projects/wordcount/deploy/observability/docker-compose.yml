# Local observability stack for wordcount — roadmap #8 + #9 + #12.
# Brings up two wordcount instances (edge + upstream), Prometheus (scraping
# /metrics), Grafana (dashboards), and Jaeger (traces) so all three pillars are
# live against real traffic: the golden-signals PromQL from notes/promql.md,
# and the OTLP spans from notes/otlp.md.
#
#   docker compose -f deploy/observability/docker-compose.yml up --build -d
#   # generate some traffic — every request now hops edge -> upstream:
#   for i in $(seq 100); do curl -s --data-binary "hello world" localhost:8080/count >/dev/null; done
#   open http://localhost:3000    # Grafana — anonymous viewer, dashboard auto-loads
#   open http://localhost:9090    # Prometheus — Status > Targets shows wordcount UP
#   open http://localhost:16686   # Jaeger — pick service "wordcount", find a trace:
#                                  # two spans, two services (wordcount -> wordcount-upstream)
#   open http://localhost:9093    # Alertmanager — firing/grouped alerts and silences
#   # watch a routed alert land at the webhook sink:
#   docker compose -f deploy/observability/docker-compose.yml logs -f alertsink
#
# Tear down with: docker compose -f deploy/observability/docker-compose.yml down
services:
  wordcount:
    # The "edge" instance — the one curl hits. Forwards every /count to
    # wordcount-upstream instead of counting locally (WORDCOUNT_UPSTREAM_URL,
    # client.go), so the trace has a real second hop — roadmap #12.
    build:
      context: ../..          # the wordcount project root (where the Dockerfile lives)
    command: ["-serve", ":8080"]
    environment:
      # Turns on the hand-rolled OTLP exporter (otlp.go) and points it at Jaeger's
      # OTLP/HTTP ingest. Unset = spans are still timed and logged, just not shipped.
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=wordcount
      - WORDCOUNT_UPSTREAM_URL=http://wordcount-upstream:8080/count
    ports:
      - "8080:8080"
    depends_on:
      - jaeger
      - wordcount-upstream

  wordcount-upstream:
    # The leaf: same image, same binary, just no WORDCOUNT_UPSTREAM_URL of its
    # own, so it counts locally and returns. No published port — only the edge
    # instance reaches it, over the compose network.
    build:
      context: ../..
    command: ["-serve", ":8080"]
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=wordcount-upstream
    depends_on:
      - jaeger

  jaeger:
    # all-in-one: OTLP ingest + storage + UI in one container, for local use.
    image: jaegertracing/all-in-one:1.58
    environment:
      - COLLECTOR_OTLP_ENABLED=true   # accept OTLP on :4317 (gRPC) and :4318 (HTTP)
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP/HTTP — where otlp.go POSTs /v1/traces directly today

  otel-collector:
    # Sits between the app and Jaeger so tail sampling (deployed but not yet
    # wired into the app — next commit) has a place to buffer a whole trace
    # before deciding to keep or drop it. See otel-collector.yaml, roadmap #13.
    image: otel/opentelemetry-collector-contrib:0.105.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./rules:/etc/prometheus/rules:ro
    ports:
      - "9090:9090"
    depends_on:
      - wordcount
      - alertmanager

  alertmanager:
    # Receives firing alerts from Prometheus and routes them to a receiver —
    # roadmap #10. Config (the routing tree) lives in alertmanager.yml.
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"   # Alertmanager UI — firing/grouped alerts, silences

  alertsink:
    # The webhook receiver Alertmanager routes to — the same wordcount binary in
    # `-webhook` mode (webhook.go). No published port; it's reached over the
    # compose network. Tail it with: docker compose logs -f alertsink.
    build:
      context: ../..
    command: ["-webhook", ":9094"]

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      # Demo-only creds; anonymous viewing is on so the dashboard opens with no login.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
