# Local observability stack for wordcount — roadmap #8 + #9.
# Brings up the app, Prometheus (scraping /metrics), Grafana (dashboards), and
# Jaeger (traces) so all three pillars are live against real traffic: the
# golden-signals PromQL from notes/promql.md, and the OTLP spans from notes/otlp.md.
#
#   docker compose -f deploy/observability/docker-compose.yml up --build -d
#   # generate some traffic:
#   for i in $(seq 100); do curl -s --data-binary "hello world" localhost:8080/count >/dev/null; done
#   open http://localhost:3000    # Grafana — anonymous viewer, dashboard auto-loads
#   open http://localhost:9090    # Prometheus — Status > Targets shows wordcount UP
#   open http://localhost:16686   # Jaeger — pick service "wordcount" to see the waterfall
#
# Tear down with: docker compose -f deploy/observability/docker-compose.yml down
services:
  wordcount:
    build:
      context: ../..          # the wordcount project root (where the Dockerfile lives)
    command: ["-serve", ":8080"]
    environment:
      # Turns on the hand-rolled OTLP exporter (otlp.go) and points it at Jaeger's
      # OTLP/HTTP ingest. Unset = spans are still timed and logged, just not shipped.
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    ports:
      - "8080:8080"
    depends_on:
      - jaeger

  jaeger:
    # all-in-one: OTLP ingest + storage + UI in one container, for local use.
    image: jaegertracing/all-in-one:1.58
    environment:
      - COLLECTOR_OTLP_ENABLED=true   # accept OTLP on :4317 (gRPC) and :4318 (HTTP)
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP/HTTP — where otlp.go POSTs /v1/traces

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./rules:/etc/prometheus/rules:ro
    ports:
      - "9090:9090"
    depends_on:
      - wordcount

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      # Demo-only creds; anonymous viewing is on so the dashboard opens with no login.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
